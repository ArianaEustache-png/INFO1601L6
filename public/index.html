<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigator and Window Demo</title>
</head>
<body>
  <h1>Navigator and Window Demo</h1>
  <button onclick="redirect('https://www.google.com')">Go to Google</button>

  <script>
    //get client data using navigator
    console.log(window.navigator.cookieEnabled);
    console.log(window.navigator.onLine);
    console.log(navigator.appVersion);
    console.log(navigator.userAgent);
    console.log(navigator.platform);

    //get window metadata using window
    console.log(window.location.href); //get full url
    console.log(window.location.protocol);
    console.log(window.location.hostname);

    function redirect(url){
      window.location.assign(url); //redirects the page to another url
    }

    window.onload = function(event){
      console.log("Page has loaded");
      //do other javascript stuff here
    }
  </script>
</body>
</html>
