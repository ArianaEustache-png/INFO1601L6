<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Demo</title>
</head>
<body>
  <h1>JavaScript Alert, Confirm, and Prompt Demo</h1>

  <button onclick="alertFun()">Run Alert</button>
  <button onclick="confirmFun()">Run Confirm</button>
  <button onclick="promptFun()">Run Prompt</button>

  <script>
   function alertFun(){
    alert("Hello !");
   }

   function confirmFun(){
     let didConfirm = confirm("Are you sure about that?");
     if(didConfirm){
       alert("You confirmed :)");
     }else{
      alert("You did not confirm :(");
     }
   }

   function promptFun(){
    let val = prompt("What is your name?");
    alert(`You've entered: ${val}`);
   }

  </script>
</body>
</html>
