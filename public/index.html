<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Load Example</title>
</head>
<body>
  <h1>Image Load Demo</h1>

  <!-- Render an image from placecage.com -->
  <img id="myImage" src="https://www.placecage.com/400/300" alt="Sample Cage Image">

  <script>
    // Define the loaded function
    function loaded() {
      console.log("img loaded");
    }

    // Attach the loaded function to the image's load event
    const imgElement = document.getElementById("myImage");
    imgElement.addEventListener("load", loaded);
  </script>
</body>
</html>
